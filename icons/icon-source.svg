<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    
        <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#eef2f8"/>
        </linearGradient>
    
        <linearGradient id="letters" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#2660b0"/>
          <stop offset="100%" stop-color="#0d2c5c"/>
        </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#e5391a"/>
      <stop offset="45%" stop-color="#ff6820"/>
      <stop offset="80%" stop-color="#ffab3a"/>
      <stop offset="100%" stop-color="#ffdd6b"/>
    </linearGradient>
  </defs>

  <!-- Solid rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Flat KAI letters -->
  <g fill="url(#letters)">
    <!-- K -->
    <rect x="75" y="175" width="48" height="200"/>
    <polygon points="123,265 210,175 262,175 148,282"/>
    <polygon points="123,265 210,375 262,375 148,258"/>

    <!-- A - flat geometric -->
    <path d="M 275 375 L 322 175 L 358 175 L 405 375 L 365 375 L 356 340 L 324 340 L 315 375 Z"/>
    <rect x="328" y="278" width="24" height="30"/>

    <!-- I -->
    <rect x="420" y="175" width="48" height="200"/>
  </g>

  <!-- Blue dot on I -->
  <circle cx="444" cy="145" r="26" fill="url(#letters)"/>

  <!-- FLAT flame - single path, no drop shadow, no inner layer -->
  <path d="
    M 256 65
    C 240 100, 265 130, 258 165
    C 254 185, 240 195, 240 220
    C 240 240, 258 250, 258 275
    C 258 300, 235 315, 235 340
    C 235 372, 268 385, 295 375
    C 322 365, 340 340, 335 310
    C 330 285, 310 275, 315 250
    C 320 228, 340 220, 335 195
    C 328 172, 310 165, 305 145
    C 300 122, 290 105, 285 85
    C 280 68, 268 55, 256 65 Z"
    fill="url(#flame)"/>
</svg>