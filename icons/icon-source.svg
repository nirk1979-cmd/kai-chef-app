<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#123769"/>
      <stop offset="55%" stop-color="#0d2c5c"/>
      <stop offset="100%" stop-color="#081f45"/>
    </linearGradient>
    <linearGradient id="flame" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#c8371a"/>
      <stop offset="35%" stop-color="#ff5a1a"/>
      <stop offset="70%" stop-color="#ff9436"/>
      <stop offset="100%" stop-color="#ffc862"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="50%" y1="100%" x2="50%" y2="20%">
      <stop offset="0%" stop-color="#ffcc4d" stop-opacity="0"/>
      <stop offset="60%" stop-color="#ffdd80" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff2c0" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="glow" cx="70%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3fb4e5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3fb4e5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dotGrad" x1="30%" y1="30%" x2="80%" y2="80%">
      <stop offset="0%" stop-color="#4aa5e0"/>
      <stop offset="100%" stop-color="#1e5f9c"/>
    </linearGradient>
  </defs>

  <!-- Rounded background with gradient -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#glow)"/>

  <!-- White K letter - bold, geometric, positioned left -->
  <g transform="translate(115, 128)">
    <!-- Vertical stroke of K -->
    <rect x="0" y="0" width="60" height="256" rx="4" fill="#ffffff"/>
    <!-- Upper diagonal of K -->
    <path d="M 60 128 L 175 0 L 235 0 L 105 145 Z" fill="#ffffff"/>
    <!-- Lower diagonal of K -->
    <path d="M 60 128 L 175 256 L 235 256 L 105 130 Z" fill="#ffffff"/>
  </g>

  <!-- Flame silhouette - main body, right side of icon -->
  <g transform="translate(310, 90)">
    <!-- Outer flame -->
    <path d="
      M 60 300
      C 20 280, 5 235, 15 195
      C 20 175, 32 160, 32 145
      C 32 130, 22 118, 30 100
      C 38 88, 55 90, 60 75
      C 65 60, 55 45, 68 30
      C 78 18, 92 22, 100 10
      C 105 3, 110 -2, 118 8
      C 122 25, 118 42, 128 55
      C 138 68, 152 68, 158 82
      C 165 100, 152 115, 158 132
      C 165 152, 182 158, 178 182
      C 175 205, 158 218, 158 240
      C 158 268, 140 295, 118 305
      C 100 313, 78 310, 60 300 Z
    " fill="url(#flame)"/>
    <!-- Inner flame highlight (lighter yellow center) -->
    <path d="
      M 82 265
      C 62 250, 55 220, 65 195
      C 72 178, 82 165, 82 148
      C 82 132, 78 118, 88 108
      C 95 100, 105 105, 108 92
      C 112 78, 108 62, 118 52
      C 125 45, 132 50, 135 62
      C 138 78, 132 92, 140 108
      C 148 122, 158 135, 152 158
      C 148 180, 138 195, 138 218
      C 138 240, 125 262, 108 268
      C 100 272, 90 272, 82 265 Z
    " fill="url(#flameInner)"/>
  </g>

  <!-- Blue dot for the 'i' - top of the flame area -->
  <circle cx="410" cy="112" r="30" fill="url(#dotGrad)"/>
  <circle cx="402" cy="104" r="10" fill="#ffffff" opacity="0.35"/>
</svg>